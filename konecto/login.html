<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONECTO — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">KONECTO</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="empleos.html">Ofertas y Demandas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="usuarios.html">Altas Usuarios</a>
          </li>
        </ul>
        <span class="navbar-text" id="usuarioLogueado">No conectado</span>
      </div>
    </div>
  </nav>

  <main class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="login-card">
          <div class="login-header">
            <h2>INICIAR SESIÓN</h2>
          </div>
          <div class="login-body">
            <form id="formLogin" novalidate>
              <div class="login-campos">
                <div class="mb-3">
                  <label for="inputEmail" class="form-label">Correo Electrónico</label>
                  <input type="email" class="form-control" id="inputEmail"
                         placeholder="tu@email.com" required>
                </div>
                <div class="mb-3">
                  <label for="inputPassword" class="form-label">Contraseña</label>
                  <input type="password" class="form-control" id="inputPassword"
                         placeholder="Tu contraseña" required>
                </div>
              </div>
              <div class="d-grid mt-3">
                <button type="submit" class="btn-login">INICIAR SESIÓN</button>
              </div>
            </form>
            <div id="mensajeLogin" class="alert mt-3 d-none" role="alert"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
