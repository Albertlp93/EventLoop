<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONECTO — Altas Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">KONECTO</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="empleos.html">Ofertas y Demandas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="usuarios.html">Altas Usuarios</a>
          </li>
        </ul>
        <span class="navbar-text" id="usuarioLogueado">No conectado</span>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="row g-4">

      <div class="col-md-4">
        <div class="form-empleos">
          <div class="form-empleos-header">
            <h2>ALTAS USUARIOS</h2>
          </div>
          <div class="form-empleos-body">
            <form id="formUsuarios" novalidate>
              <div class="mb-3">
                <label for="inputNombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="inputNombre"
                       placeholder="Ej: Ana García" required>
              </div>
              <div class="mb-3">
                <label for="inputEmail" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="inputEmail"
                       placeholder="Ej: ana@konecto.com" required>
              </div>
              <div class="mb-3">
                <label for="inputPassword" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="inputPassword"
                       placeholder="Mínimo 6 caracteres" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn-alta">DAR DE ALTA</button>
              </div>
            </form>
            <div id="mensajeUsuarios" class="alert mt-3 d-none" role="alert"></div>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div id="tablaUsuarios"></div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/usuarios.js"></script>
</body>
</html>
