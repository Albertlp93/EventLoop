<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONECTO — Usuarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">KONECTO</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="empleos.html">Ofertas y Demandas</a></li>
          <li class="nav-item"><a class="nav-link active" href="usuarios.html">Altas Usuarios</a></li>
        </ul>
        <span class="navbar-text">
          <span id="usuarioLogueado">No conectado</span>
          <a href="#" id="btnCerrarSesion" class="ms-2 text-warning fw-bold text-decoration-none d-none">(Salir)</a>
        </span>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="form-empleos">
          <div class="form-empleos-header"><h2>NUEVO USUARIO</h2></div>
          <div class="form-empleos-body">
            <form id="formUsuarios">
              <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" id="inputNombre" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="inputPassword" required>
              </div>
              <button type="submit" class="btn-alta">REGISTRAR</button>
            </form>
            <div id="mensajeUsuarios" class="alert mt-3 d-none"></div>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div id="tablaUsuarios"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/usuarios.js"></script>
</body>
</html>
