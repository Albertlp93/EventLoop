<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión Ofertas / Demandas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../CSS/gestor_of_dm.css">

</head>

<body class="container mt-4">

<h1>Gestión Ofertas / Demandas</h1>

<h3>Nueva oferta o demanda</h3>

<form>

<div class="mb-2">
<label>Titulo</label>
<input class="form-control">
</div>

<div class="mb-2">
<label>Usuario</label>
<input class="form-control">
</div>

<div class="mb-2">
<label>Descripcion</label>
<textarea class="form-control"></textarea>
</div>

<div class="mb-2">
<label>Horario</label>
<input class="form-control">
</div>

<div class="mb-2">
<label>Sueldo</label>
<input class="form-control">
</div>

<div class="mb-2">
<label>Tipo</label>
<select class="form-control">
<option>Oferta</option>
<option>Demanda</option>
</select>
</div>

<button class="btn btn-success mt-2">Crear</button>

</form>

<hr>

<h3>Listado</h3>

<table class="table">

<thead>
<tr>
<th>Titulo</th>
<th>Usuario</th>
<th>Tipo</th>
<th>Eliminar</th>
</tr>
</thead>

<tbody>
<tr>
<td>Programador</td>
<td>Juan</td>
<td>Oferta</td>
<td><button class="btn btn-danger btn-sm">Eliminar</button></td>
</tr>
</tbody>

</table>

<script type="module" src="../JS/gestor_of_dm.js"></script>

</body>
</html>
